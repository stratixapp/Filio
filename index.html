<!DOCTYPE html>

<head>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='10' fill='%23C9A84C' fill-opacity='.15'/><path d='M10 20 L20 10 L30 20 L20 30 Z' fill='%23C9A84C'/><circle cx='20' cy='20' r='4' fill='%23C9A84C'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="css/style.css" />

  <div id="app"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- Core -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/firestore.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/security.js"></script>
  <script src="js/dom-safe.js"></script>
  <script src="js/api-proxy.js"></script>
  <script src="js/data-integrity.js"></script>

  <script src="js/pages/settings.js"></script>

  <script src="js/pages/itr-tracker.js"></script>

  <script src="js/pages/notices.js"></script>
  <script src="js/pages/email-center.js"></script>

  <!-- Phase 7 -->
  <script src="js/pages/analytics.js"></script>

  <!-- Phase 8 -->
  <script src="js/pages/import-export.js"></script>
  <script src="js/pages/white-label.js"></script>

  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof Security !== 'undefined') Security.init();
    });
  </script>
  <script>
    // Register PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[Filio] SW registered'))
          .catch(err => console.warn('[Filio] SW failed:', err.message));
      });
    }
  </script>
</body>
</html>
